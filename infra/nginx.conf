server {
    listen 80;
    server_name _;          # replace with your domain or EC2 public IP

    # Increase buffer sizes for large webhook payloads
    client_max_body_size 20m;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE: disable proxy buffering so events reach the browser immediately
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;   # 1 hour — keeps SSE connections alive
        chunked_transfer_encoding on;
    }
}
