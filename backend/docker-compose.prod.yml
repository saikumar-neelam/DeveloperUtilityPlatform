services:

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:4222:4222"   # bind to localhost only — not exposed externally

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - nats
    env_file:
      - .env.production
